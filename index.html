<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spekt — Волейбол и стиль жизни</title>
    <style>
        :root {
            --dark-bg: #121212;
            --deep-navy: #0a0f1a;
            --midnight-blue: #1a1e2d;
            --gold: #d4af37;
            --light-gold: #f0c870;
            --text-light: #e0e0e0;
            --text-medium: #a0a0a0;
            --border-color: #333333;
        }

        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.7;
        }

        header {
            background: linear-gradient(135deg, var(--deep-navy), var(--midnight-blue));
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--light-gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            font-size: 1.4rem;
            margin-top: 0.5rem;
            opacity: 0.9;
            color: var(--text-medium);
        }

        nav ul {
            list-style-type: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 2.5rem 0 0 0;
            padding: 0;
        }

        nav a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-weight: 400;
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--light-gold);
            background-color: rgba(212, 175, 55, 0.1);
        }

        main {
            max-width: 1100px;
            margin: -50px auto 0 auto;
            padding: 3rem 2rem 4rem 2rem;
            background-color: var(--midnight-blue);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        section {
            margin-bottom: 4rem;
        }

        h2 {
            color: var(--light-gold);
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            text-align: center;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--gold);
            margin: 10px auto;
        }

        .volleyball-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .volleyball-text p {
            margin-bottom: 1.2rem;
            text-align: justify;
        }

        .highlight {
            color: var(--light-gold);
            font-weight: bold;
        }

        .volleyball-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .volleyball-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .volleyball-img:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.2);
        }

        footer {
            background-color: var(--deep-navy);
            color: var(--text-medium);
            text-align: center;
            padding: 2.5rem 2rem;
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
        }

        .contact-info {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--light-gold);
        }

        .sponsor-info {
            margin-bottom: 1.5rem;
            font-style: italic;
            opacity: 0.8;
            color: var(--text-medium);
        }

        .personal-description {
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem;
            background-color: rgba(26, 31, 42, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            min-height: 120px;
            color: var(--text-light);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .volleyball-section {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            nav ul {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Spekt</h1>
            <div class="subtitle">Стиль жизни, спорт и вдохновение</div>
            <nav>
                <ul>
                    <li><a href="#about">Обо мне</a></li>
            <li><a href="#volleyball">Волейбол</a></li>
            <li><a href="#gallery">Галерея</a></li>
            <li><a href="#contact">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="about">
            <h2>Обо мне</h2>

            <p>люблю ее очень думаю она та самая первая и последняя любовь в моей жизни
